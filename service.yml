name: gateway-images
lang: python
lang_version: "3.12"
git:
  enable: true
codeowners:
  enable: true
semaphore:
  enable: true
  pipeline_type: cp-dockerfile
  pipeline_enable: false
  docker_repos: ["confluentinc/cpc-gateway", "confluentinc/confluent-gateway-for-cloud"]
  maven_phase: 'package'
  maven_skip_deploy: true
  build_arm: true
  sign_images: true
  os_types: ["ubi9"]
  nano_version: true
  use_packages: true
  cp_images: true
  push_latest: true
  tasks:
    - name: cp-dockerfile-build
      branch: master
      pipeline_file: .semaphore/cp_dockerfile_build.yml
      parameters:
        - name: GATEWAY_VERSION
          required: true
        - name: PACKAGES_URL
          required: true
        - name: PACKAGES_MAVEN_URL
          required: true
        - name: PACKAGING_BUILD_NUMBER
          required: true
        - name: ALLOW_UNSIGNED
          required: true
          default_value: 'False'
          options:
            - 'True'
            - 'False'
    - name: cp-dockerfile-promote
      branch: master
      pipeline_file: .semaphore/cp_dockerfile_promote.yml
      parameters:
        - name: GATEWAY_VERSION
          required: true
        - name: IMAGE_REVISION
          required: true
          default_value: '1'
        - name: UPDATE_LATEST_TAG
          required: true
        - name: PACKAGING_BUILD_NUMBER
          required: true
        - name: PROMOTE_OS_TYPE
          required: true
          options:
            - 'ubi'
    - name: version-compatibility-tests
      branch: master
      at: "0 21 * * 0"    # Sun at 21:00 UTC
      pipeline_file: .semaphore/version_compatibility_tests.yml
      parameters:
        - name: KAFKA_SERVER_VERSION
          required: false
          description: "Kafka server version to test against, e.g., 8.0.0"
        - name: KAFKA_CLIENT_VERSION
          required: false
          description: "Kafka client version to test against, e.g., 8.0.0"
    - name: librdkafka-version-compatibility-tests
      branch: master
      at: "0 21 * * 1"    # Mon at 21:00 UTC
      pipeline_file: .semaphore/librdkafka_version_compatibility_tests.yml
      parameters:
        - name: LIBRDKAFKA_CLIENT_VERSION
          required: false
          description: "confluent-kafka-python version to test, e.g., 2.6.2"
        - name: KAFKA_SERVER_VERSION
          required: false
          description: "Kafka server version to test against, e.g., 8.0.0"
    # TEMP: manually-triggered task to run version compat against a specific
    # dev gateway image (e.g. the ubi9-micro migration build). Not scheduled.
    - name: version-compatibility-tests-tmp
      branch: micro-migration-ubi9-compat-test
      pipeline_file: .semaphore/version_compatibility_tests.yml
      parameters:
        - name: KAFKA_SERVER_VERSION
          required: false
          default_value: '8.0.0'
          description: "Kafka server version to test against, e.g., 8.0.0"
        - name: KAFKA_CLIENT_VERSION
          required: false
          default_value: '8.0.0'
          description: "Kafka client version to test against, e.g., 8.0.0"
        - name: DOCKER_REGISTRY
          required: false
          default_value: '519856050701.dkr.ecr.us-west-2.amazonaws.com/docker/dev/'
          description: "Registry prefix (keep trailing slash) for the gateway image under test"
        - name: GATEWAY_IMAGE_TAG
          required: false
          default_value: 'latest'
          description: "Gateway image tag to test, e.g., dev-1.3.x-ffd1aeb3-ubi9.amd64"
        - name: GATEWAY_VERSION
          required: false
          default_value: '1.3.0'
          description: "Label for the S3 results path (e.g., 1.3.0)"
code_artifact:
  enable: true
  package_paths:
    - maven-snapshots/maven/io.confluent/cpc-gateway-images
    - maven-snapshots/maven/io.confluent/cpc-gateway-images-parent
    - maven-snapshots/maven/io.confluent.cpc-gateway-images/cpc-gateway-images-parent
    - maven-snapshots/maven/io.confluent.cpc-gateway-images/cpc-gateway  
    - maven-snapshots/maven/io.confluent.cpc-gateway-images/confluent-gateway-for-cloud
