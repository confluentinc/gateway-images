# librdkafka Version Compatibility Tests Pipeline
# Tests confluent-kafka-python (librdkafka) client versions against Kafka server versions
# through the Confluent Gateway.
# Schedule: Monday at 21:00 UTC (offset from Java tests on Sunday)

version: v1.0
name: librdkafka-version-compatibility-tests
agent:
  machine:
    type: s1-prod-ubuntu24-04-amd64-1

execution_time_limit:
  hours: 6

global_job_config:
  prologue:
    commands:
      - checkout
      - . vault-setup
      - . vault-sem-get-secret v1/ci/kv/cpc-gateway/slack-webhook-tests-notifications
      - . assume-iam-role arn:aws:iam::523370736235:role/root-account-access
      - export RESULTS_TIMESTAMP=$(date +%Y-%m-%d-%H-%M-%S)
      - export S3_BUCKET="gateway-results"
      - export S3_FOLDER="librdkafka-version-testing-results"
      - export GW_VERSION="${GATEWAY_VERSION:-1.0.0}"
      - export RESULTS_S3_PATH="s3://${S3_BUCKET}/${S3_FOLDER}/${GW_VERSION}/${RESULTS_TIMESTAMP}"
      - echo "Test results will be uploaded to - ${RESULTS_S3_PATH}"
      - sem-version python 3.12

blocks:
  - name: librdkafka Version Compatibility Tests
    dependencies: []
    task:
      jobs:
        - name: Run librdkafka Version Compatibility Tests
          commands:
            - cd gateway-version-compatibility-test-tool/librdkafka

            # Setup Python environment for metrics parsing
            - ./librdkafka-version-compatibility.sh --setup-env

            # Run the compatibility tests
            - echo "Starting librdkafka version compatibility tests..."
            - |
              if [ -n "${LIBRDKAFKA_CLIENT_VERSION:-}" ] && [ -n "${KAFKA_SERVER_VERSION:-}" ]; then
                  echo "Running single test: librdkafka ${LIBRDKAFKA_CLIENT_VERSION} with Kafka ${KAFKA_SERVER_VERSION}"
                  ./librdkafka-version-compatibility.sh --single "${LIBRDKAFKA_CLIENT_VERSION}" "${KAFKA_SERVER_VERSION}" || TEST_FAILED=true
              else
                  ./librdkafka-version-compatibility.sh --run || TEST_FAILED=true
              fi

            # Collect results
            - echo "Collecting test results..."
            - |
              cd ..
              if [ -d "compatibility-results" ] && [ "$(ls -A compatibility-results/)" ]; then
                export LATEST_RESULTS_DIR=$(ls -t compatibility-results/ | head -n1)
                echo "Latest results directory: compatibility-results/${LATEST_RESULTS_DIR}"
              else
                echo "No results directory found or directory is empty"
                export LATEST_RESULTS_DIR=""
              fi

            # Create summary for Slack notification
            - |
              clean_number() {
                  local value=$(echo "$1" | tr -d '\n\r' | xargs | grep -o '[0-9]*' | head -n1)
                  echo "${value:-0}"
              }
              if [ -n "${LATEST_RESULTS_DIR}" ] && [ -d "compatibility-results/${LATEST_RESULTS_DIR}" ]; then
                echo "Creating test summary..."
                METRICS_FILES=$(find compatibility-results/${LATEST_RESULTS_DIR} -name "*_metrics.txt" | wc -l)
                STATUS_FILES=$(find compatibility-results/${LATEST_RESULTS_DIR} -name "*_status.txt" | wc -l)
                TOTAL_TESTS=$([ ${STATUS_FILES} -gt ${METRICS_FILES} ] && echo ${STATUS_FILES} || echo ${METRICS_FILES})
                FAILED_TESTS=0
                PASSED_TESTS=0
                SETUP_FAILED_TESTS=0

                if [ -f "compatibility-results/${LATEST_RESULTS_DIR}/reports/compatibility_summary.txt" ]; then
                  FAILED_TESTS=$(grep -c "❌ FAIL" compatibility-results/${LATEST_RESULTS_DIR}/reports/compatibility_summary.txt 2>/dev/null || echo "0")
                  PASSED_TESTS=$(grep -c "✅ PASS" compatibility-results/${LATEST_RESULTS_DIR}/reports/compatibility_summary.txt 2>/dev/null || echo "0")
                  SETUP_FAILED_TESTS=$(grep -c "🚫 SETUP_FAILED" compatibility-results/${LATEST_RESULTS_DIR}/reports/compatibility_summary.txt 2>/dev/null || echo "0")
                  FAILED_TESTS=$(clean_number "${FAILED_TESTS}")
                  PASSED_TESTS=$(clean_number "${PASSED_TESTS}")
                  SETUP_FAILED_TESTS=$(clean_number "${SETUP_FAILED_TESTS}")
                  TOTAL_TESTS=$(clean_number "${TOTAL_TESTS}")

                  if [ $((PASSED_TESTS + FAILED_TESTS + SETUP_FAILED_TESTS)) -ne ${TOTAL_TESTS} ] && [ ${TOTAL_TESTS} -gt 0 ]; then
                    PASSED_TESTS=$((TOTAL_TESTS - FAILED_TESTS - SETUP_FAILED_TESTS))
                  fi
                else
                  PASSED_TESTS=$((TOTAL_TESTS - FAILED_TESTS))
                fi

                if [ ${TOTAL_TESTS} -gt 0 ]; then
                  SUCCESS_RATE=$(( (PASSED_TESTS * 100) / TOTAL_TESTS ))
                else
                  SUCCESS_RATE=0
                fi

                cat > test_summary.txt << EOF
              librdkafka Gateway Version Compatibility Test Results
              =====================================================
              Gateway Version: ${GW_VERSION}
              Client Type: librdkafka (confluent-kafka-python)
              Timestamp: ${RESULTS_TIMESTAMP}
              Total Test Combinations: ${TOTAL_TESTS}
              Passed: ${PASSED_TESTS}
              Failed: ${FAILED_TESTS}
              Setup Failed: ${SETUP_FAILED_TESTS}
              Success Rate: ${SUCCESS_RATE}%
              Results Location: ${RESULTS_S3_PATH}
              EOF

                echo "Test Summary:"
                echo "" >> test_summary.txt
                cat "compatibility-results/${LATEST_RESULTS_DIR}/reports/compatibility_summary.txt" >> test_summary.txt 2>/dev/null || true
              else
                echo "No results directory found!"
                echo "Test execution may have failed completely" > test_summary.txt
              fi

            # Upload results to S3
            - echo "Uploading results to S3..."
            - |
              if [ -n "${LATEST_RESULTS_DIR}" ] && [ -d "compatibility-results/${LATEST_RESULTS_DIR}" ]; then
                aws s3 cp compatibility-results/${LATEST_RESULTS_DIR}/ ${RESULTS_S3_PATH}/ --recursive
                echo "Results uploaded to ${RESULTS_S3_PATH}"
                if [ -f "test_summary.txt" ]; then
                  aws s3 cp test_summary.txt s3://${S3_BUCKET}/${S3_FOLDER}/${GW_VERSION}/latest_summary.txt
                fi
                echo "${RESULTS_TIMESTAMP}" | aws s3 cp - s3://${S3_BUCKET}/${S3_FOLDER}/${GW_VERSION}/test_runs/${RESULTS_TIMESTAMP}.marker
              else
                echo "No results to upload"
                if [ -f "test_summary.txt" ]; then
                  aws s3 cp test_summary.txt s3://${S3_BUCKET}/${S3_FOLDER}/${GW_VERSION}/failed_run_${RESULTS_TIMESTAMP}.txt
                fi
              fi

            # Send Slack notification
            - echo "Sending Slack notification..."
            - |
              if [ -n "$SLACK_WEBHOOK_URL" ]; then
                if [ "$TEST_FAILED" = "true" ]; then
                  COLOR="danger"
                  STATUS="FAILED"
                elif [ "${FAILED_TESTS:-0}" -gt 0 ]; then
                  COLOR="danger"
                  STATUS="TEST FAILURES"
                elif [ "${SETUP_FAILED_TESTS:-0}" -gt 0 ]; then
                  COLOR="warning"
                  STATUS="SETUP FAILURES"
                else
                  COLOR="good"
                  STATUS="PASSED"
                fi
                SUMMARY_TEXT=$(cat test_summary.txt 2>/dev/null || echo "No summary available")
                curl -X POST -H 'Content-type: application/json' \
                  --data "{
                    \"username\": \"Semaphore CI\",
                    \"icon_emoji\": \":gear:\",
                    \"attachments\": [{
                      \"color\": \"${COLOR}\",
                      \"title\": \"librdkafka Version Compatibility Tests ${STATUS}\",
                      \"text\": \"Branch: ${SEMAPHORE_GIT_BRANCH}\\nCommit: ${SEMAPHORE_GIT_SHA:0:7}\\n\\n\`\`\`\\n${SUMMARY_TEXT}\\n\`\`\`\",
                      \"fields\": [
                        {\"title\": \"Results Location\", \"value\": \"${RESULTS_S3_PATH}\", \"short\": false},
                        {\"title\": \"Workflow\", \"value\": \"<https://semaphore.ci.confluent.io/workflows/${SEMAPHORE_WORKFLOW_ID}|View Workflow>\", \"short\": true}
                      ]
                    }]
                  }" $SLACK_WEBHOOK_URL
              else
                echo "SLACK_WEBHOOK_URL not set, skipping notification"
              fi

            # Fail the job if tests failed
            - |
              if [ "$TEST_FAILED" = "true" ]; then
                echo "librdkafka version compatibility tests failed (script execution error)"
                exit 1
              elif [ "${FAILED_TESTS:-0}" -gt 0 ]; then
                echo "librdkafka version compatibility tests failed (${FAILED_TESTS} test failures)"
                exit 1
              elif [ "${SETUP_FAILED_TESTS:-0}" -gt 0 ]; then
                echo "Tests completed with ${SETUP_FAILED_TESTS} setup failures (non-blocking)"
              else
                echo "librdkafka version compatibility tests completed successfully"
              fi

      epilogue:
        always:
          commands:
            - echo "Cleaning up Docker containers and images..."
            - docker compose -f docker-compose-librdkafka.yml down -v || true
            - docker compose -f docker-compose-librdkafka-kraft.yml down -v || true
            - docker system prune -f || true
